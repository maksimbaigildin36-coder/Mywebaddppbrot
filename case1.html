<!DOCTYPE html>
<html lang="ru">
<head>

<title>Платиновый ⭐</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="background">

  <button onclick="goBack()">Назад ⬅️</button>

</body>
</html>
